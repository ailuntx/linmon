name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install musl tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools dpkg-dev apt-utils

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2

      - run: chmod +x install.sh scripts/package.sh scripts/package-deb.sh
      - run: cargo fmt --check
      - run: cargo build --release --locked --target x86_64-unknown-linux-musl

      - name: check version
        run: |
          version="$(./target/x86_64-unknown-linux-musl/release/linmon -V)"
          if [[ "$version" != *"${GITHUB_REF_NAME#v}"* ]]; then
            echo "version mismatch: $version vs $GITHUB_REF_NAME" >&2
            exit 1
          fi

      - name: package
        run: |
          ./scripts/package.sh "$GITHUB_REF_NAME" ./target/x86_64-unknown-linux-musl/release/linmon
          ./scripts/package-deb.sh "${GITHUB_REF_NAME#v}" ./target/x86_64-unknown-linux-musl/release/linmon

      - name: prepare release assets
        run: |
          versioned_zip="$(find dist -maxdepth 1 -name '*.zip' | head -n1)"
          fixed_zip="dist/linmon-linux-x86_64.zip"
          cp "$versioned_zip" "$fixed_zip"
          sha256sum "$fixed_zip" > "dist/linmon-linux-x86_64.zip.sha256"
          versioned_deb="$(find dist -maxdepth 1 -name '*.deb' | head -n1)"
          fixed_deb="dist/linmon_amd64.deb"
          cp "$versioned_deb" "$fixed_deb"
          sha256sum "$fixed_deb" > "dist/linmon_amd64.deb.sha256"
          sed "s#__REPOSITORY__#${GITHUB_REPOSITORY}#g" ./install.sh > dist/install.sh
          chmod +x dist/install.sh

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.zip
            dist/*.deb
            dist/*.sha256
            dist/install.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
