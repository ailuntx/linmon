name: pages

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/pages.yml
      - Cargo.toml
      - Cargo.lock
      - README.md
      - LICENSE
      - src/**
      - scripts/**

permissions:
  pages: write
  id-token: write

jobs:
  build-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools dpkg-dev apt-utils

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - uses: Swatinem/rust-cache@v2

      - run: chmod +x scripts/package-deb.sh scripts/build-apt-repo.sh
      - run: cargo build --release --locked --target x86_64-unknown-linux-musl

      - name: build apt repo
        run: |
          version="$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json,sys; print(json.load(sys.stdin)["packages"][0]["version"])')"
          ./scripts/package-deb.sh "$version" ./target/x86_64-unknown-linux-musl/release/linmon
          ./scripts/build-apt-repo.sh "dist/linmon_${version}_amd64.deb" dist/pages

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/pages

  deploy-pages:
    needs: build-pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
